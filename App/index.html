<!DOCTYPE html>

<html>
  <head>
    <title>LmanTW</title>

    <style>
      * {
        font-family: monospace;
      }

      .text {
        user-select: none;
        color: white;
        margin: 0px
      }
 
      .button {
        text-decoration: underline;
        text-decoration-thickness: calc(calc(1vw + 1vh) * 0.1);
        cursor: pointer
      }

      .fade-enter-active, .fade-leave-active {
        transition: opacity 0.5s
      }

      .fade-enter-from, .fade-leave-to {
        opacity: 0
      }

      .fade-enter-to, .fade-leave-from {
        opacity: 1
      }
    </style>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <canvas id="canvas" style="background-color: black; width: 100vw; height: 101vh; cursor: none"></canvas>
    <div id="app">
      <Settings></Settings>   
    </div>
  </body>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <script type="module">
    import { render } from './Scripts/Render.js'
    import Light from './Scripts/Light.mjs'
    import Scene from './Scripts/Scene.js'

    import { Settings, getSettings } from './Components/Settings.js'

    import home from './Scenes/Home.js'

    new Light(document.body)

    Vue.createApp({
      components: {
        Settings
      }
    }).mount('#app')

    // Render
    function renderLoop () {
      render()

      setTimeout(renderLoop, 1000 / getSettings().fps)
    }

    renderLoop()

    Scene.loadScene(home)
  </script>
</html>
