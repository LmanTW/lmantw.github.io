  <style>
    :root {
      --backgroundColor: black;
      --textColor: white
    }

    * {
      font-family: monospace, sans-serif
    }

    .text {
      color: var(--textColor);
      margin: 0px
    }

    .banner {
      display: flex;
      border-radius: 1rem;
      cursor: pointer;
      transition: transform 0.75s;
    } 

    .banner .imageWrapper {
      display: flex;
      align-items: center;
      border-radius: 1rem;
      width: 100%;
      height: 100%;
      overflow: hidden
    }

    .banner .imageWrapper img {
      transition: transform 2s, filter 2s;
      transform: scale(1.01);
      filter: blur(0.1rem)
    }

    .banner .title {
      position: absolute;
      background-color: var(--backgroundColor);
      color: var(--textColor);
      font-size: 1.5rem;
      margin-left: 1rem;
      margin-top: 1rem;
      padding-left: 0.5rem;
      padding-right: 0.5rem;
      x: 0rem;
      y: 0rem;
      transition: transform 0.5s;
      transform-origin: top left
    }

    .banner .hint {
      position: absolute;
      background-color: var(--backgroundColor);
      color: var(--textColor);
      font-size: 0.8rem;
      margin-left: 1rem;
      margin-top: 1rem;
      padding-left: 0.5rem;
      padding-right: 0.5rem;
      x: 0rem;
      y: 0rem;
      transition: transform 0.4s;
      transform-origin: top left
    }

    .banner:hover .imageWrapper img {
      transform: scale(1.1);
      filter: blur(0rem)
    } 

    .banner:hover .title {
      transform: scale(1.05) rotate(5deg);
    }

    .banner:hover .hint {
      transform: translateY(1.8rem) scale(1.05) rotate(8deg);
    }
  </style>
