<html>
  <style>
    @keyframes hint {
      0% { left: -150px }
      50% { left: -100 }
      100% { left: 0px }
    }
    @keyframes hintOut {
      0% { top: 0px }
      50% { top: -30 }
      75% { top: -25 }
      100% { top: -60 }
    }
  </style>

  <body style="margin: 0px">
    <div id="hint" style="position: fixed; border-style: none solid solid none; border-width: 2.5px; border-radius: 0px 0px 30px 0px; animation: hint 1.5s">
      <h2 style="margin: 0px; padding: 10px">拖移來移動</h2>
    </div>
    <canvas id="canvas" style="cursor: grab"></canvas>
  </body>

  <script>
    window.addEventListener('mousedown', () => {
      document.getElementById('hint').style.animation = 'hintOut 1s'
      document.getElementById('hint').addEventListener('animationend', () => document.getElementById('hint').remove(), { once: true })
    })
    window.addEventListener('touchstart', () => {
      document.getElementById('hint').style.animation = 'hintOut 1s'
      document.getElementById('hint').addEventListener('animationend', () => document.getElementById('hint').remove(), { once: true })
    })
  </script>

  <script type="module">
    import Engine from '/Engine/API.js'
    import { createInterval } from '/Engine/Tools/Interval.js'
    import getRandom from '/Engine/Tools/GetRandom.js'

    Engine.create.text('LmanTW', 0, -1, { size: 2.5 })
    Engine.create.text('一個喜歡編程, 編/做曲的自學生', 0, 1, { size: 0.75 })

    let objects = []
    for (let i = 0; i < 10; i++) {
      let startAngle = getRandom(0, 360)
      objects.push({ front: 'start', back: 'end', object: Engine.create.circle(0, 0, 7+i, { color: 'transparent', startAngle, endAngle: startAngle+getRandom(0, 360), border: {} }) })
    }

    createInterval(1000/30, () => {
      objects.forEach((item) => {
        item.object.change(`style.${item.front}Angle`, 3*Math.cos(item.object.get(`style.${item.back}Angle`)*Math.PI/180))
        item.object.change(`style.${item.back}Angle`, 3*Math.sin(item.object.get(`style.${item.front}Angle`)*Math.PI/180))

        if (item.object.get(`style.startAngle`) > item.object.get(`style.endAngle`)) {
          let save = { startAngle: item.object.get(`style.${item.front}Angle`), endAngle: item.object.get(`style.${item.back}Angle`) }
          
          item.object.set(`style.${item.back}Angle`, save.startAngle)
          item.object.set(`style.${item.front}Angle`, save.endAngle)

          item.front = (item.front === 'start') ? 'end' : 'start'
          item.back = (item.back === 'end') ? 'start' : 'end'

          while (item.object.get('style.startAngle') > 360) item.object.change('style.startAngle', -360)
          while (item.object.get('style.endAngle') > 360) item.object.change('style.endAngle', -360)
        }
      })
    })

    Engine.create.text('我的專長', 20.3, -4, { size: 1.5, align: 'left' })
    Engine.create.line(20, -4.5, 20, 0)
    Engine.create.travelLine(20, 0, 100, 0)

    Engine.create.text('編程', 102, -3.8, { size: 1.5, align: 'left' })
    Engine.create.line(100, -5, 104.9, -5)
    Engine.create.travelLine(100, -5, 100, -50)

    Engine.create.text('編/做曲', 102, 3.5, { size: 1.5, align: 'left' })
    Engine.create.line(100, 5, 106.7, 5)
    Engine.create.travelLine(100, 5, 100, 50)

    Engine.create.line(100, 50, 100, 75)
    Engine.create.text('LMusic', 100.5, 52.5, { size: 1.5, align: 'left' })
    Engine.create.text('我個人的音樂頻道，該頻道的所有音樂都是無版權的，並且在 Youtube, SoundCoud, StreetVoice 上都設有頻道。', 100.5, 55, { size: 1, align: 'left' })
    Engine.create.text('(個人覺的最滿意的作品是 "安靜的聖誕節")', 100.5, 56.3, { size: 1, align: 'left' })
    Engine.create.textButton('Youtube', 100.5, 58.8, () => {}, { size: 1.25, align: 'left' })
    Engine.create.textButton('SoundCloud', 106, 58.8, () => {}, { size: 1.25, align: 'left' })
    Engine.create.textButton('StreetVoice', 114, 58.8, () => {}, { size: 1.25, align: 'left' })

    Engine.create.text('關於我', -20.3, -4, { size: 1.5, align: 'right' })
    Engine.create.line(-20, -4.5, -20, 0)
    Engine.create.travelLine(-20, 0, -100, 0)

    Engine.create.line(-100, 0, -100, -20)
    Engine.create.text('關於我', -100.5, -19.5, { size: 1.5, align: 'right' })
    Engine.create.text('我從2年級開始自學，根據我爸媽的描述，一開始會開始自學是因為"天時地利人和"', -100.5, -17, { size: 1, align: 'right' })
    Engine.create.text('之後發現我其實蠻適合自學的？所以就繼續自學了:D，然後我在三年級的時候拿到了我的電腦', -100.5, -15.7, { size: 1, align: 'right' })
    Engine.create.text('發現我對編程很感興趣，所以我就開始玩 Scratch 了，一路玩到國一才正式接觸 真 · 編程', -100.5, -14.4, { size: 1, align: 'right' })
    Engine.create.text('然後就開始研究 Javascript，做了幾台 Discord 機器人，其中一台累積到了5000+的玩家', -100.5, -13.1, { size: 1, align: 'right' })
    Engine.create.text('同時我也有在玩編/作曲，主要是做鄉村, 管弦, 電子等風格較多，有時候也會幫朋友做一些音樂', -100.5, -11.8, { size: 1, align: 'right' })
    Engine.create.text('(如果他們願意給我做的話lol))', -100.5, -10.5, { size: 1, align: 'right' })

    Engine.startRender()
  </script>
</html>
