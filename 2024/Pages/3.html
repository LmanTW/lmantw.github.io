<div>
  <div light:style="display: flex; flex-direction: column; width: 100vw; height: 100vh; overflow: hidden">
    <h1 class="enter_left leave_right" light:style="flex: 1; color: [$textColor]; font-size: [$textSize2]; text-align: right; margin: 0px; margin-right: [1.5ps]; margin-top: [1ps]">曼德博集合</h1>
    <div class="enter_up leave_down" light:style="backdrop-filter: brightness(0.9) blur([0.1ps])">
      <h1 id="description" light:style="color: [$textColor]; font-size: [$textSize3]; margin: 0px; margin-left: [1ps]; margin-top: [0.9ps]; margin-bottom: [0.9ps]">加載中...</h1>
    </div> 
  </div>
  <div id="container" light:style="position: fixed; display: flex; center: row column; left: 0px; top: 0px; width: 100vw; height: 100vh; z-index: -1">
    <img id="image" class="leave_up" light:style="width: [50ps]">
  </div> 
</div>

<script>
  const root = document.querySelector(':root')

  root.style.setProperty('--transitionTime', '0.5s')
  root.style.setProperty('--backgroundColor', 'black')
  root.style.setProperty('--textColor', '#f7f7f7')
  root.style.setProperty('--textColorTransparent', 'rgba(247,247,247,0.1)')

  const container = Component.getElementByID('container')
  const image = Component.getElementByID('image')
  const description = Component.getElementByID('description')

  container.style.opacity = 0

  Component.TimerManager.createTimeout(750, () => {
    Component.ListenerManager.listen(image, 'load', () => {
      Component.TimerManager.createTimeout(100, () => {
        description.innerHTML = '曼德博集合是一個數學模型，在 2D 視覺化後會產生一個擁有無限細節的圖形。\n曼德博集合所產生出的圖形擁有著很多獨特的輪廓，可以說是『無限的藝術』。'

        description.setAttribute('light:animation:type', '50')
      })

      container.animate([
        { opacity: 0 },
        { opacity: 1 },
      ], { duration: 2500, easing: 'cubic-bezier(.5,0,.5,1)', fill: 'forwards' })

      container.animate([
        { transform: 'translateX(0px) translateY(0px) scale(1)' },
        { transform: 'translateX(calc(calc(1vw + 1vh) * 13)) translateY(calc(calc(1vw + 1vh) * -86)) scale(10)' },
      ], { duration: 1000*60, easing: 'cubic-bezier(.5,0,.5,1)', fill: 'forwards' })
    })

    image.src = './Images/Mandelbrot.png'
  })
</script>
