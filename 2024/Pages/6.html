<div>
  <h1 class="enter_down leave_up" light:style="color: [$textColor]; font-size: [$textSize1]; margin: 0px">Lightbery</h1> 
  <h1 class="enter_right leave_left" light:style="color: [$textColor]; font-size: [$textSize3]; margin: 0px; margin-bottom: [1.5ps]">一個為你喜愛的作品所打造的平台。</h1>

  <img id="image" class="shadow enter_left leave_right" src="./Images/Lightbery1.png" light:style="border-radius: [0.5ps]; width: [35ps]; margin-bottom: [0.1ps]"> 
  <h1 class="enter_up leave_down" light:style="color: [$textColor]; font-size: [$textSize4]; text-decoration: line-through; margin: 0px">(仍在開發段，圖片僅供參考)</h1>
</div>

<script>
  const root = document.querySelector(':root')

  root.style.setProperty('--transitionTime', '10s')
  root.style.setProperty('--backgroundColor', '#f7f7f7')
  root.style.setProperty('--textColor', 'black')
  root.style.setProperty('--textColorTransparent', 'rgba(0,0,0,0.1)')

  const image = Component.getElementByID('image')

  let currentImage = 1

  Component.ListenerManager.listen(window, 'keydown', (event) => {
    if (event.key === 'ArrowRight') {
      image.animate([
        { transform: 'translateX(0px)', filter: 'blur(0px)', opacity: 1 },
        { transform: 'translateX(calc(calc(1vw + 1vh) * -2))', filter: 'blur(calc(calc(1vw + 1vh) * 0.1))', opacity: 0 }
      ], { duration: 500, easing: 'cubic-bezier(.5,0,.5,1)', fill: 'forwards' })

      currentImage++

      if (currentImage > 3) currentImage = 1

      Component.TimerManager.createTimeout(500, () => {
        image.src = `./Images/Lightbery${currentImage}.png`

        image.animate([
          { transform: 'translateX(calc(calc(1vw + 1vh) * 2))', filter: 'blur(calc(calc(1vw + 1vh) * 0.1))', opacity: 0 },
          { transform: 'translateX(0px)', filter: 'blur(0px)', opacity: 1 }
        ], { duration: 500, easing: 'cubic-bezier(.5,0,.5,1)', fill: 'forwards' })
      })
    } else if (event.key === 'ArrowLeft') {
      image.animate([
        { transform: 'translateX(0px)', filter: 'blur(0px)', opacity: 1 },
        { transform: 'translateX(calc(calc(1vw + 1vh) * 2))', filter: 'blur(calc(calc(1vw + 1vh) * 0.1))', opacity: 0 }
      ], { duration: 500, easing: 'cubic-bezier(.5,0,.5,1)', fill: 'forwards' })

      currentImage--

      if (currentImage < 1) currentImage = 3

      Component.TimerManager.createTimeout(500, () => {
        image.src = `./Images/Lightbery${currentImage}.png`

        image.animate([
          { transform: 'translateX(calc(calc(1vw + 1vh) * -2))', filter: 'blur(calc(calc(1vw + 1vh) * 0.1))', opacity: 0 },
          { transform: 'translateX(0px)', filter: 'blur(0px)', opacity: 1 }
        ], { duration: 500, easing: 'cubic-bezier(.5,0,.5,1)', fill: 'forwards' })
      })
    }
  })
</script>
