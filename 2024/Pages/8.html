<div light:style="display: flex">
  <div light:style="margin-right: [2ps]">
    <h1 class="enter_down leave_up" light:style="color: [$textColor]; font-size: [$textSize1]; margin: 0px">Boxes</h1>
    <h1 class="enter_up leave_down" light:style="color: [$textColor]; font-size: [$textSize3]; margin: 0px">一個很不實際的程式語言。</h1>
  </div>

  <div>
    <h1 class="enter_left leave_right" light:style="color: [$textColor]; font-size: [$textSize3]; margin: 0px; margin-bottom: [0.5ps]">Hello World 範例</h1>
    <div class="enter_left leave_right" light:style="border-style: solid; border-color: [$textColor]; border-width: [0.1ps]; border-radius: [0.5ps]; margin-bottom: [2ps]; padding: [0.5ps] [0.6ps]; width: [30ps]">
      <h1 light:style="color: [$textColor]; font-size: [$textSize3]; margin: 0px" light:animation:type="25">+words <- ['Hello', 'World']
+@main <- print(List.join(words, ' '))</h1>
    </div>

    <h1 class="enter_up leave_down" light:style="color: [$textColor]; font-size: [$textSize3]; margin: 0px; margin-bottom: [0.5ps]">異同步雙無限迴圈</h1>
    <div class="enter_up leave_down" light:style="border-style: solid; border-color: [$textColor]; border-width: [0.1ps]; border-radius: [0.5ps]; margin-bottom: [1ps]; padding: [0.5ps] [0.6ps]; width: [30ps]">
      <h1 light:style="color: [$textColor]; font-size: [$textSize3]; margin: 0px" light:animation:type="25">+@loop1 <- { (Infinity) : { print('Loop 1') }}
+@loop2 <- { (Infinity) : { print('Loop 2') }}

+@main <- &loop1() | &loop2()</h1>
    </div>
  </div>
</div>

<script>
  const root = document.querySelector(':root')

  root.style.setProperty('--transitionTime', '10s')
  root.style.setProperty('--backgroundColor', '#f7f7f7')
  root.style.setProperty('--textColor', 'black')
  root.style.setProperty('--textColorTransparent', 'rgba(0,0,0,0.1)')
</script>
