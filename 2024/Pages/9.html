<div>
  <h1 class="enter_down leave_up" light:style="color: [$textColor]; font-size: [$textSize1]; margin: 0px">音樂製作</h1>
  <h1 class="enter_right leave_left" light:style="color: [$textColor]; font-size: [$textSize3]; margin: 0px; margin-bottom: [1.5ps]">近期我覺得還不錯的作品。</h1>

  <video id="video" class="shadow enter_up leave_down" light:style="border-radius: [0.5ps]; width: calc(100vw - [35ps])">
    <source src="./Videos/Music.mov"> 
  </video>  
</div>

<script>
  const root = document.querySelector(':root')

  root.style.setProperty('--transitionTime', '10s')
  root.style.setProperty('--backgroundColor', '#f7f7f7')
  root.style.setProperty('--textColor', 'black')
  root.style.setProperty('--textColorTransparent', 'rgba(0,0,0,0.1)')

  const video = Component.getElementByID('video')

  let playing = false

  Component.ListenerManager.listen(window, 'keydown', (event) => {
    if (event.key == ' ') {
      if (playing) video.pause()
      else video.play() 

      playing = !playing
    }

    else if (event.key === 'ArrowLeft') video.currentTime -= 5
    else if (event.key === 'ArrowRight') video.currentTime += 5
  })
</script>
